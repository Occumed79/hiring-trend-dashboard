services:
  - type: web
    name: hiring-trend-dashboard
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: ADZUNA_APP_ID
        sync: false
      - key: ADZUNA_APP_KEY
        sync: false
      - key: USAJOBS_API_KEY
        sync: false
      - key: USAJOBS_USER_AGENT
        sync: false
      - key: JOB_API_TOKEN
        sync: false
      - key: JOB_API_MODE
        value: fallback
      - key: JOB_API_FALLBACK_MIN_EXISTING
        value: "1"
      - key: JOB_API_ADAPTERS
        value: jsearch
      - key: JOB_API_COUNTRY
        value: us
      - key: JOB_API_LIMIT
        value: "25"
      - key: JOB_API_DATE_POSTED
        value: month
      - key: JOB_API_TIMEOUT_MS
        value: "12000"
      - key: INGEST_HTTP_TIMEOUT_MS
        value: "10000"
      - key: CRON_SECRET
        generateValue: true
      - key: NEXT_PUBLIC_APP_URL
        sync: false

  - type: cron
    name: daily-ingest
    env: node
    buildCommand: npm install
    schedule: "0 6 * * *"
    startCommand: node scripts/ingest.js
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: ADZUNA_APP_ID
        sync: false
      - key: ADZUNA_APP_KEY
        sync: false
      - key: USAJOBS_API_KEY
        sync: false
      - key: USAJOBS_USER_AGENT
        sync: false
      - key: JOB_API_TOKEN
        sync: false
      - key: JOB_API_MODE
        value: fallback
      - key: JOB_API_FALLBACK_MIN_EXISTING
        value: "1"
      - key: JOB_API_ADAPTERS
        value: jsearch
      - key: JOB_API_COUNTRY
        value: us
      - key: JOB_API_LIMIT
        value: "25"
      - key: JOB_API_DATE_POSTED
        value: month
      - key: JOB_API_TIMEOUT_MS
        value: "12000"
      - key: INGEST_HTTP_TIMEOUT_MS
        value: "10000"
      - key: INGEST_CRON_TIMEOUT_MS
        value: "120000"
      - key: CRON_SECRET
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
