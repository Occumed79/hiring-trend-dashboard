services:
  - type: web
    name: hiring-trend-dashboard
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: ADZUNA_APP_ID
        sync: false
      - key: ADZUNA_APP_KEY
        sync: false
      - key: USAJOBS_API_KEY
        sync: false
      - key: USAJOBS_EMAIL
        sync: false
      - key: CRON_SECRET
        generateValue: true
      - key: NEXT_PUBLIC_APP_URL
        sync: false

  - type: cron
    name: daily-ingest
    env: node
    buildCommand: npm install
    schedule: "0 6 * * *"
    startCommand: node scripts/ingest.js
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: ADZUNA_APP_ID
        sync: false
      - key: ADZUNA_APP_KEY
        sync: false
      - key: USAJOBS_API_KEY
        sync: false
      - key: USAJOBS_EMAIL
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
